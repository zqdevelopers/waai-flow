[phases.install]
cmds = [
  'npm ci --prefix backend',
  'npm ci --prefix frontend',
]

[phases.build]
cmds = [
  'cd backend && npx prisma generate',
  'cd backend && npx prisma db push --accept-data-loss',
  'cd frontend && npm run build',
]

[start]
cmd = 'sh -c "cd /app/backend && exec node src/app.js"'
